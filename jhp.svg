<svg viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.15); }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes flagWave {
        0%   { transform: skewY(0deg) scaleX(1); }
        25%  { transform: skewY(2deg) scaleX(0.97); }
        50%  { transform: skewY(0deg) scaleX(1); }
        75%  { transform: skewY(-2deg) scaleX(0.97); }
        100% { transform: skewY(0deg) scaleX(1); }
      }
      @keyframes flagFloat {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        30%  { transform: translateY(-8px) rotate(1deg); }
        60%  { transform: translateY(4px) rotate(-0.5deg); }
      }
      @keyframes poleWay {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(1deg); }
      }
      @keyframes ashokaSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>

    <linearGradient id="allColors" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9933;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#000080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138808;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="polGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>

    <linearGradient id="skyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dff0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1"/>
    </linearGradient>

    <filter id="flagShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background sky gradient -->
  <rect width="1584" height="396" fill="url(#skyBg)"/>

  <!-- ===== INDIAN FLAG (SMALL, FLYING) ===== -->
  <g transform="translate(20, 8)" style="animation: flagFloat 4s ease-in-out infinite; animation-delay: 1.2s;">
    <rect x="0" y="0" width="5" height="330" fill="url(#polGrad)" rx="2"/>
    <circle cx="2.5" cy="3" r="7" fill="#ffd700"/>
    <g transform="translate(5, 14)" style="animation: flagWave 3s ease-in-out infinite; animation-delay: 0.6s; transform-origin: 0 54px;" filter="url(#flagShadow)">
      <rect x="0" y="0"  width="165" height="36" fill="#FF9933"/>
      <rect x="0" y="36" width="165" height="36" fill="#FFFFFF"/>
      <rect x="0" y="72" width="165" height="36" fill="#138808"/>
      <g transform="translate(82,54)">
        <circle cx="0" cy="0" r="16" fill="none" stroke="#000080" stroke-width="2"/>
        <circle cx="0" cy="0" r="3"  fill="#000080"/>
        <g style="animation: ashokaSpin 5s linear infinite; transform-origin: 0px 0px;">
          <line x1="0" y1="-4"  x2="0"   y2="-15"  stroke="#000080" stroke-width="1"/>
          <line x1="0" y1="4"   x2="0"   y2="15"   stroke="#000080" stroke-width="1"/>
          <line x1="-4" y1="0"  x2="-15" y2="0"    stroke="#000080" stroke-width="1"/>
          <line x1="4" y1="0"   x2="15"  y2="0"    stroke="#000080" stroke-width="1"/>
          <line x1="-2.8" y1="-2.8" x2="-10.6" y2="-10.6" stroke="#000080" stroke-width="1"/>
          <line x1="2.8"  y1="2.8"  x2="10.6"  y2="10.6"  stroke="#000080" stroke-width="1"/>
          <line x1="2.8"  y1="-2.8" x2="10.6"  y2="-10.6" stroke="#000080" stroke-width="1"/>
          <line x1="-2.8" y1="2.8"  x2="-10.6" y2="10.6"  stroke="#000080" stroke-width="1"/>
          <line x1="-1" y1="-3.8" x2="-3.9" y2="-14.5" stroke="#000080" stroke-width="0.8"/>
          <line x1="1"  y1="3.8"  x2="3.9"  y2="14.5"  stroke="#000080" stroke-width="0.8"/>
          <line x1="3.8" y1="-1" x2="14.5" y2="-3.9"  stroke="#000080" stroke-width="0.8"/>
          <line x1="-3.8" y1="1" x2="-14.5" y2="3.9"  stroke="#000080" stroke-width="0.8"/>
          <line x1="-3.8" y1="-1" x2="-14.5" y2="-3.9" stroke="#000080" stroke-width="0.8"/>
          <line x1="3.8"  y1="1"  x2="14.5"  y2="3.9"  stroke="#000080" stroke-width="0.8"/>
          <line x1="1"  y1="-3.8" x2="3.9"  y2="-14.5" stroke="#000080" stroke-width="0.8"/>
          <line x1="-1" y1="3.8"  x2="-3.9" y2="14.5"  stroke="#000080" stroke-width="0.8"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Soft India-colored background glow circles -->
  <circle cx="450" cy="100" r="65" fill="#FF9933" opacity="0.07" style="animation: float 4s ease-in-out infinite;"/>
  <circle cx="1150" cy="100" r="75" fill="#138808" opacity="0.07" style="animation: float 5s ease-in-out infinite; animation-delay: 1s;"/>
  <circle cx="1200" cy="320" r="60" fill="#000080" opacity="0.05" style="animation: float 4.5s ease-in-out infinite; animation-delay: 2s;"/>
  <circle cx="400" cy="340" r="55" fill="#FF9933" opacity="0.06" style="animation: float 3.8s ease-in-out infinite; animation-delay: 0.5s;"/>

  <!-- Decorative Stars (Top) -->
  <g style="animation: twinkle 2s ease-in-out infinite;">
    <circle cx="510" cy="50" r="3" fill="#FF9933"/>
    <circle cx="500" cy="50" r="1.5" fill="#FF9933"/>
    <circle cx="520" cy="50" r="1.5" fill="#FF9933"/>
    <circle cx="510" cy="40" r="1.5" fill="#FF9933"/>
    <circle cx="510" cy="60" r="1.5" fill="#FF9933"/>
  </g>
  <g style="animation: twinkle 2.5s ease-in-out infinite; animation-delay: 0.5s;">
    <circle cx="1080" cy="55" r="3" fill="#138808"/>
    <circle cx="1070" cy="55" r="1.5" fill="#138808"/>
    <circle cx="1090" cy="55" r="1.5" fill="#138808"/>
    <circle cx="1080" cy="45" r="1.5" fill="#138808"/>
    <circle cx="1080" cy="65" r="1.5" fill="#138808"/>
  </g>
  <g style="animation: twinkle 2.2s ease-in-out infinite; animation-delay: 1s;">
    <circle cx="792" cy="45" r="2.5" fill="#000080"/>
    <circle cx="784" cy="45" r="1.2" fill="#000080"/>
    <circle cx="800" cy="45" r="1.2" fill="#000080"/>
    <circle cx="792" cy="37" r="1.2" fill="#000080"/>
    <circle cx="792" cy="53" r="1.2" fill="#000080"/>
  </g>

  <!-- Main Content -->
  <g>
    <text x="792" y="125" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="#202124" text-anchor="middle">
      Jatinkumar Parmar
    </text>
    <!-- India tricolor underline -->
    <rect x="450" y="140" width="228" height="5" fill="#FF9933">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="678" y="140" width="228" height="5" fill="#000080">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="906" y="140" width="228" height="5" fill="#138808">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </rect>

    <!-- Star Icon Left -->
    <text x="290" y="205" font-size="36" style="animation: pulse 1.8s ease-in-out infinite;">🌟</text>
    <!-- Subtitle -->
    <text x="792" y="200" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#5F6368" text-anchor="middle">
      AI Engineer | Google Cloud Specialist | Conversation AI Expert
    </text>
    <!-- Star Icon Right -->
    <text x="1285" y="205" font-size="36" style="animation: pulse 1.8s ease-in-out infinite; animation-delay: 0.9s;">🌟</text>
  </g>

  <!-- Decorative Circles with Tech Text (India flag colors) -->
  <g style="animation: float 3s ease-in-out infinite;">
    <circle cx="295" cy="290" r="45" fill="#FF9933" opacity="0.2"/>
    <circle cx="295" cy="290" r="38" fill="#FF9933"/>
    <text x="295" y="298" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Python</text>
  </g>
  <g style="animation: float 3.2s ease-in-out infinite; animation-delay: 0.3s;">
    <circle cx="405" cy="290" r="45" fill="#138808" opacity="0.2"/>
    <circle cx="405" cy="290" r="38" fill="#138808"/>
    <text x="405" y="298" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">ML</text>
  </g>
  <g style="animation: float 3.4s ease-in-out infinite; animation-delay: 0.6s;">
    <circle cx="515" cy="290" r="45" fill="#000080" opacity="0.2"/>
    <circle cx="515" cy="290" r="38" fill="#000080"/>
    <text x="515" y="298" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">DL</text>
  </g>
  <g style="animation: float 3.6s ease-in-out infinite; animation-delay: 0.9s;">
    <circle cx="625" cy="290" r="45" fill="#FF9933" opacity="0.2"/>
    <circle cx="625" cy="290" r="38" fill="#FF9933"/>
    <text x="625" y="298" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">NLP</text>
  </g>
  <g style="animation: float 3.8s ease-in-out infinite; animation-delay: 1.2s;">
    <circle cx="735" cy="290" r="45" fill="#138808" opacity="0.2"/>
    <circle cx="735" cy="290" r="38" fill="#138808"/>
    <text x="735" y="298" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">GCP</text>
  </g>
  <g style="animation: float 4s ease-in-out infinite; animation-delay: 1.5s;">
    <circle cx="845" cy="290" r="45" fill="#000080" opacity="0.2"/>
    <circle cx="845" cy="290" r="38" fill="#000080"/>
    <text x="845" y="298" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">MLOps</text>
  </g>
  <g style="animation: float 3.5s ease-in-out infinite; animation-delay: 1.8s;">
    <circle cx="955" cy="290" r="45" fill="#FF9933" opacity="0.2"/>
    <circle cx="955" cy="290" r="38" fill="#FF9933"/>
    <text x="955" y="298" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">SQL</text>
  </g>
  <g style="animation: float 3.7s ease-in-out infinite; animation-delay: 2.1s;">
    <circle cx="1065" cy="290" r="45" fill="#138808" opacity="0.2"/>
    <circle cx="1065" cy="290" r="38" fill="#138808"/>
    <text x="1065" y="298" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">TensorFlow</text>
  </g>
  <g style="animation: float 3.9s ease-in-out infinite; animation-delay: 2.4s;">
    <circle cx="1175" cy="290" r="45" fill="#000080" opacity="0.2"/>
    <circle cx="1175" cy="290" r="38" fill="#000080"/>
    <text x="1175" y="298" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">PyTorch</text>
  </g>
  <g style="animation: float 4.1s ease-in-out infinite; animation-delay: 2.7s;">
    <circle cx="1285" cy="290" r="45" fill="#FF9933" opacity="0.2"/>
    <circle cx="1285" cy="290" r="38" fill="#FF9933"/>
    <text x="1285" y="298" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">LLM</text>
  </g>

  <!-- Decorative Stars (Bottom) -->
  <g style="animation: twinkle 2.3s ease-in-out infinite; animation-delay: 0.7s;">
    <circle cx="360" cy="360" r="2.5" fill="#138808"/>
    <circle cx="352" cy="360" r="1.2" fill="#138808"/>
    <circle cx="368" cy="360" r="1.2" fill="#138808"/>
    <circle cx="360" cy="352" r="1.2" fill="#138808"/>
    <circle cx="360" cy="368" r="1.2" fill="#138808"/>
  </g>
  <g style="animation: twinkle 2.7s ease-in-out infinite; animation-delay: 1.3s;">
    <circle cx="1230" cy="365" r="2.5" fill="#FF9933"/>
    <circle cx="1222" cy="365" r="1.2" fill="#FF9933"/>
    <circle cx="1238" cy="365" r="1.2" fill="#FF9933"/>
    <circle cx="1230" cy="357" r="1.2" fill="#FF9933"/>
    <circle cx="1230" cy="373" r="1.2" fill="#FF9933"/>
  </g>

  <!-- Decorative animated lines in India tricolor -->
  <line x1="270" y1="250" x2="1400" y2="250" stroke="#FF9933" stroke-width="2" opacity="0.3">
    <animate attributeName="stroke-dasharray" values="0,2000;2000,0" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="270" y1="254" x2="1400" y2="254" stroke="#000080" stroke-width="1.5" opacity="0.2">
    <animate attributeName="stroke-dasharray" values="1000,1000;2000,0" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="270" y1="340" x2="1400" y2="340" stroke="#138808" stroke-width="2" opacity="0.3">
    <animate attributeName="stroke-dasharray" values="2000,0;0,2000" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>
